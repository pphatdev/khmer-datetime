name: Build and Test

on:
  push:
    branches: [ "feat/lunar" ]
  pull_request:
    branches: [ "feat/lunar" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x, 26.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Setup Deno
      uses: denoland/setup-deno@v1


    - name: Install dependencies
      run: npm ci

    - name: Run Build
      run: npm run build

    - name: Run Tests
      run: npm run test